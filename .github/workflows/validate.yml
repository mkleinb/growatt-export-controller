name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate repo files
        run: |
          test -f custom_components/growatt_export_controller/manifest.json
          test -f hacs.json
          test -f README.md
