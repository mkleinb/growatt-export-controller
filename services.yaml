set_export_limit:
  name: Set export limit
  description: Set the Growatt export limiting parameters.
  fields:
    percentage:
      name: Percentage
      description: Export limit percentage between 0 and 100.
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 1
          mode: slider
    meter_enabled:
      name: Meter enabled
      description: Whether the meter-based export control should be enabled.
      required: false
      selector:
        boolean: {}
